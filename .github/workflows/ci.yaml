name: Go CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: latest
          args: --timeout=5m
          install-mode: binary
          skip-cache: false

      - name: Check Go Formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted correctly:"
            gofmt -l .
            echo "Please run 'gofmt -s -w .' to format your code"
            exit 1
          fi
        shell: bash

      - name: Run Go Vet
        run: go vet ./...
